<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🎂 电子生日祝福</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            background: #0a0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow-x: hidden;
            position: relative;
        }
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            width: 100%;
            padding: 24px 16px 32px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
        }
        .header {
            text-align: center;
            margin-bottom: 36px;
        }
        .header .title {
            font-size: clamp(2.2rem, 7vw, 4.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #f9d976, #f39c12, #e74c3c, #f9d976);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 4s ease-in-out infinite;
        }
        @keyframes gradientShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        .header .subtitle {
            margin-top: 8px;
            font-size: clamp(0.9rem, 1.8vw, 1.2rem);
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 4px;
            word-break: break-word;
        }
        .editable-name {
            border-bottom: 1px dashed rgba(255, 215, 0, 0.4);
            cursor: text;
            padding: 0 4px;
            color: #f1c40f;
            font-weight: 500;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 8px;
        }
        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px 18px 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 215, 0, 0.2);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 12px;
        }
        .card-header .icon {
            font-size: 1.6rem;
        }
        .card-header h3 {
            font-size: 1.1rem;
            color: #fff;
        }
        .card-header .badge {
            margin-left: auto;
            font-size: 0.65rem;
            background: rgba(255, 215, 0, 0.15);
            color: #f1c40f;
            padding: 2px 10px;
            border-radius: 100px;
        }
        .music-upload-area,
        .photo-upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.02);
            min-height: 80px;
        }
        .music-upload-area:hover,
        .photo-upload-area:hover {
            border-color: rgba(255, 215, 0, 0.4);
        }
        .music-upload-area .upload-icon,
        .photo-upload-area .upload-icon {
            font-size: 2rem;
            opacity: 0.6;
        }
        .music-upload-area .upload-text,
        .photo-upload-area .upload-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-top: 4px;
        }
        .music-player {
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        .music-player.active {
            display: flex;
        }
        .music-player .track-name {
            color: #fff;
            font-weight: 500;
            font-size: 0.85rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .music-player .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .music-player .controls button {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1rem;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .music-player .controls button:hover {
            background: rgba(255, 215, 0, 0.2);
        }
        .music-player .controls button.primary {
            background: rgba(255, 215, 0, 0.2);
            width: 44px;
            height: 44px;
            font-size: 1.3rem;
        }
        .music-player .progress-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 120px;
        }
        .music-player .progress-bar {
            flex: 1;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
        .music-player .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #f1c40f;
            cursor: pointer;
        }
        .music-player .time-display {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.65rem;
            min-width: 60px;
            text-align: center;
        }
        .music-player .volume-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .music-player .volume-wrap input[type="range"] {
            width: 50px;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
            margin-top: 6px;
            max-height: 260px;
            overflow-y: auto;
        }
        .photo-item {
            position: relative;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.2s;
        }
        .photo-item:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-item .delete-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: #fff;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 0.6rem;
            cursor: pointer;
            opacity: 0;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-item:hover .delete-btn {
            opacity: 1;
        }
        .photo-empty {
            color: rgba(255, 255, 255, 0.25);
            text-align: center;
            padding: 16px 0;
            font-size: 0.8rem;
        }
        .record-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .record-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border: none;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .record-btn.recording {
            background: rgba(231, 76, 60, 0.25);
            border-color: rgba(231, 76, 60, 0.4);
            animation: pulse-red 1.2s infinite;
        }
        @keyframes pulse-red {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.3);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(231, 76, 60, 0);
            }
        }
        .record-btn .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e74c3c;
            display: inline-block;
        }
        .record-btn.recording .dot {
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }
        .record-timer {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            min-width: 50px;
        }
        .record-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
        .record-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .record-item .info {
            flex: 1;
            min-width: 0;
        }
        .record-item .info .name {
            color: #fff;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .record-item .info .meta {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.6rem;
        }
        .record-item .actions button {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .record-item .actions button:hover {
            background: rgba(255, 215, 0, 0.2);
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-overlay .modal-content {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 20px;
            background: #111;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }
        .modal-overlay .close-modal {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer {
            margin-top: 28px;
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.7rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 20px;
        }
        @media (max-width:480px) {
            .app-container {
                padding: 16px 12px 24px;
                border-radius: 24px;
            }
            .header .title {
                font-size: 2rem;
            }
            .cards-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .card {
                padding: 16px 14px 20px;
            }
            .music-player .controls button {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }
            .music-player .controls button.primary {
                width: 38px;
                height: 38px;
                font-size: 1.1rem;
            }
            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            }
        }
        .autoplay-hint {
            display: none;
            text-align: center;
            color: rgba(255, 215, 0, 0.5);
            font-size: 0.7rem;
            margin-top: 4px;
        }
        .autoplay-hint.show {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="modal-overlay" id="photo-modal">
        <button class="close-modal" id="modal-close">✕</button>
        <img class="modal-content" id="modal-image" src="" alt="预览" />
    </div>

    <div class="app-container">

        <header class="header">
            <div>
                <span class="deco">🎈</span>
                <span class="title">Happy Birthday</span>
                <span class="deco">🎉</span>
            </div>
            <div class="subtitle">
                ✦ 给 <span id="userNameDisplay" class="editable-name">朋友</span> 的专属祝福 ✦
                <span class="edit-hint" style="font-size:0.6rem;opacity:0.3;">✎</span>
            </div>
        </header>

        <div class="cards-grid">

            <!-- 音乐卡片 -->
            <div class="card">
                <div class="card-header">
                    <span class="icon">🎵</span>
                    <h3>背景音乐</h3>
                    <span class="badge">上传</span>
                </div>
                <div class="card-body">
                    <div class="music-upload-area" id="music-upload-area">
                        <div class="upload-icon">📁</div>
                        <div class="upload-text">点击上传音乐文件</div>
                        <input type="file" id="music-file-input" accept="audio/*" style="display:none" />
                    </div>
                    <div class="music-player" id="music-player">
                        <div class="track-name" id="track-name">未命名曲目</div>
                        <div class="controls">
                            <button id="music-prev">⏮</button>
                            <button class="primary" id="music-play-btn">▶</button>
                            <button id="music-next">⏭</button>
                            <div class="progress-wrap">
                                <input type="range" class="progress-bar" id="music-progress" min="0" max="100" value="0" />
                                <span class="time-display" id="music-time">0:00 / 0:00</span>
                            </div>
                            <div class="volume-wrap">
                                <span>🔊</span>
                                <input type="range" id="music-volume" min="0" max="100" value="80" />
                            </div>
                        </div>
                    </div>
                    <div class="autoplay-hint" id="autoplayHint">🎵 点击页面任意处播放音乐</div>
                    <div style="font-size:0.6rem;color:rgba(255,255,255,0.15);text-align:center;margin-top:4px;">＊ 支持 MP3 / WAV / M4A</div>
                </div>
            </div>

            <!-- 照片卡片 -->
            <div class="card">
                <div class="card-header">
                    <span class="icon">📸</span>
                    <h3>生日相册</h3>
                    <span class="badge" id="photo-count">0 张</span>
                </div>
                <div class="card-body">
                    <div class="photo-upload-area" id="photo-upload-area">
                        <div class="upload-icon">🖼️</div>
                        <div class="upload-text">点击上传照片</div>
                        <input type="file" id="photo-file-input" accept="image/*" multiple style="display:none" />
                    </div>
                    <div class="photo-grid" id="photo-grid">
                        <div class="photo-empty">✨ 上传一些美好瞬间吧</div>
                    </div>
                </div>
            </div>

            <!-- 录音卡片 -->
            <div class="card">
                <div class="card-header">
                    <span class="icon">🎙️</span>
                    <h3>祝福录音</h3>
                    <span class="badge" id="record-count">0 条</span>
                </div>
                <div class="card-body">
                    <div class="record-controls">
                        <button class="record-btn" id="record-btn">
                            <span class="dot"></span>
                            <span id="record-btn-text">开始录音</span>
                        </button>
                        <span class="record-timer" id="record-timer">00:00</span>
                        <button class="record-btn" id="record-clear-btn" style="padding:6px 14px;font-size:0.75rem;background:rgba(255,255,255,0.04);">🗑️ 清空</button>
                    </div>
                    <div class="record-list" id="record-list">
                        <div class="record-empty">🎤 点击「开始录音」说出祝福吧</div>
                    </div>
                </div>
            </div>

        </div>

        <div class="footer"><span>✦</span> 用心制作 · 献给最好的你 <span>✦</span></div>
    </div>

    <!-- ================================================================ -->
    <!-- ⚙️ 配置区：每次定制只改下面 3 项 -->
    <!-- ================================================================ -->
    <script>
        // 订单配置
        var ORDER_CONFIG = {
            receiverName: '小可爱', // 收祝福人姓名
            photoFiles: ['photo1.jpg'], // 照片文件名（和index.html同目录）
            musicFile: 'birthday.mp3', // 音乐文件名（和index.html同目录）
            enableSampleAudio: true // 是否自动生成示例录音
        };
        // ================================================================

        (function() {
            'use strict';

            // 获取当前页面所在目录路径
            function getBasePath() {
                var path = window.location.pathname;
                if (path.endsWith('/')) return path;
                var lastSlash = path.lastIndexOf('/');
                if (lastSlash === -1) return '/';
                return path.substring(0, lastSlash + 1);
            }
            var basePath = getBasePath();

            // 安全存储
            function setSafeStorage(key, value) { try { localStorage.setItem(key, value); } catch (e) {} }

            function getSafeStorage(key) { try { return localStorage.getItem(key); } catch (e) { return null; } }

            // ===== 加载配置 =====
            var config = window.ORDER_CONFIG;

            // 姓名
            var nameSpan = document.getElementById('userNameDisplay');
            if (config.receiverName) {
                nameSpan.textContent = config.receiverName;
                setSafeStorage('birthdayUserName', config.receiverName);
            } else {
                var saved = getSafeStorage('birthdayUserName');
                if (saved) nameSpan.textContent = saved;
            }
            nameSpan.addEventListener('input', function() { setSafeStorage('birthdayUserName', this.textContent); });
            nameSpan.addEventListener('blur', function() { setSafeStorage('birthdayUserName', this.textContent); });

            // ===== 粒子背景 =====
            var canvas = document.getElementById('particles-canvas');
            var ctx = canvas.getContext('2d');
            var width, height;
            var particles = [];
            var PARTICLE_COUNT = 50;

            function resizeCanvas() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            function Particle() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.4 + 0.15;
                this.hue = 40 + Math.random() * 30;
            }
            Particle.prototype.update = function() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;
            };
            Particle.prototype.draw = function() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = 'hsla(' + this.hue + ', 80%, 70%, ' + this.opacity + ')';
                ctx.fill();
                ctx.shadowColor = 'hsla(' + this.hue + ', 100%, 70%, 0.1)';
                ctx.shadowBlur = 8;
                ctx.fill();
                ctx.shadowBlur = 0;
            };
            for (var i = 0; i < PARTICLE_COUNT; i++) { particles.push(new Particle()); }

            function animateParticles() {
                ctx.clearRect(0, 0, width, height);
                for (var i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                for (var i = 0; i < particles.length; i++) {
                    for (var j = i + 1; j < particles.length; j++) {
                        var dx = particles[i].x - particles[j].x;
                        var dy = particles[i].y - particles[j].y;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = 'rgba(255, 215, 0, ' + (0.04 * (1 - dist / 120)) + ')';
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            // ===== 音乐播放器 =====
            var musicUploadArea = document.getElementById('music-upload-area');
            var musicFileInput = document.getElementById('music-file-input');
            var musicPlayer = document.getElementById('music-player');
            var trackName = document.getElementById('track-name');
            var playBtn = document.getElementById('music-play-btn');
            var progressBar = document.getElementById('music-progress');
            var timeDisplay = document.getElementById('music-time');
            var volumeSlider = document.getElementById('music-volume');
            var prevBtn = document.getElementById('music-prev');
            var nextBtn = document.getElementById('music-next');
            var autoplayHint = document.getElementById('autoplayHint');

            var audio = null;
            var isPlaying = false;

            function loadMusicFile(url) {
                if (audio) {
                    audio.pause();
                    audio.src = '';
                }
                audio = new Audio();
                audio.volume = volumeSlider.value / 100;
                audio.src = url;

                audio.addEventListener('canplaythrough', function() {
                    var name = url.split('/').pop() || '背景音乐';
                    trackName.textContent = name;
                    musicUploadArea.style.display = 'none';
                    musicPlayer.classList.add('active');
                    updateTimeDisplay();
                    audio.play()
                        .then(function() {
                            isPlaying = true;
                            playBtn.textContent = '⏸';
                            autoplayHint.classList.remove('show');
                        })
                        .catch(function() {
                            isPlaying = false;
                            playBtn.textContent = '▶';
                            autoplayHint.classList.add('show');
                            var playOnInteraction = function() {
                                if (audio && !isPlaying) {
                                    audio.play()
                                        .then(function() {
                                            isPlaying = true;
                                            playBtn.textContent = '⏸';
                                            autoplayHint.classList.remove('show');
                                        })
                                        .catch(function() {});
                                }
                                document.removeEventListener('click', playOnInteraction);
                                document.removeEventListener('touchstart', playOnInteraction);
                            };
                            document.addEventListener('click', playOnInteraction);
                            document.addEventListener('touchstart', playOnInteraction, { passive: true });
                        });
                });

                audio.addEventListener('timeupdate', function() {
                    if (audio.duration) {
                        progressBar.value = (audio.currentTime / audio.duration) * 100;
                        updateTimeDisplay();
                    }
                });

                audio.addEventListener('ended', function() {
                    isPlaying = false;
                    playBtn.textContent = '▶';
                    progressBar.value = 0;
                    audio.currentTime = 0;
                    updateTimeDisplay();
                });

                audio.addEventListener('error', function() {
                    musicUploadArea.style.display = 'flex';
                    musicPlayer.classList.remove('active');
                });
            }

            function updateTimeDisplay() {
                try {
                    if (!audio || !audio.duration) {
                        timeDisplay.textContent = '0:00 / 0:00';
                        return;
                    }
                    timeDisplay.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
                } catch (e) {}
            }

            function formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return '0:00';
                var m = Math.floor(seconds / 60);
                var s = Math.floor(seconds % 60);
                return m + ':' + (s < 10 ? '0' : '') + s;
            }

            var photos = [];

            photoFileInput.addEventListener('change', function(e) {
                if (this.files && this.files.length > 0) {
                    var files = Array.from(this.files);
                    for (var fi = 0; fi < files.length; fi++) {
                        if (files[fi].type.startsWith('image/')) {
                            var reader = new FileReader();
                            reader.onload = function(ev) {
                                photos.push(ev.target.result);
                                renderPhotos();
                            };
                            reader.readAsDataURL(files[fi]);
                        }
                    }
                }
                this.value = '';
            });

            function renderPhotos() {
                photoGrid.innerHTML = '';
                if (photos.length === 0) {
                    photoGrid.innerHTML = '<div class="photo-empty">✨ 上传一些美好瞬间吧</div>';
                    photoCount.textContent = '0 张';
                    return;
                }
                for (var i = 0; i < photos.length; i++) {
                    (function(src, idx) {
                        var div = document.createElement('div');
                        div.className = 'photo-item';
                        var img = document.createElement('img');
                        img.src = src;
                        img.alt = '照片 ' + (idx + 1);
                        img.loading = 'lazy';
                        div.appendChild(img);
                        var del = document.createElement('button');
                        del.className = 'delete-btn';
                        del.textContent = '✕';
                        del.addEventListener('click', function(e) {
                            e.stopPropagation();
                            photos.splice(idx, 1);
                            renderPhotos();
                        });
                        div.appendChild(del);
                        div.addEventListener('click', function() {
                            modalImage.src = src;
                            modalOverlay.classList.add('active');
                            document.body.style.overflow = 'hidden';
                        });
                        photoGrid.appendChild(div);
                    })(photos[i], i);
                }
                photoCount.textContent = photos.length + ' 张';
            }
